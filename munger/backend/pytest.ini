[pytest]
testpaths = tests
addopts = -m "not integration and not bench"
markers =
    integration: tests that exercise live or multi-step integration flows
    provider: tests that require model-provider access
    live_frontend: tests that hit the running frontend
    live_llm: tests that call a real LLM provider (require OPENROUTER_API_KEY); run with `pytest -m live_llm`
    bench: deterministic pipeline benchmarks (scripted LLM, real DB); run with `pytest -m bench tests/bench/`
